<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MP3 바로듣기 — YBM 북샘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#f4f6fb;font-family:'Pretendard',sans-serif;color:#1a2e44;}

  /* 상단 바 */
  .mp-header{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:10px;
    background:#1a2e44;padding:12px 16px;
    padding-top:max(12px, env(safe-area-inset-top));
  }
  .mp-back{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600;padding:0;}
  .mp-back svg{flex-shrink:0;}
  .mp-header-title{flex:1;font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* 플레이어 카드 */
  .mp-player-card{background:#1a2e44;margin:16px;border-radius:16px;padding:20px;}
  .mp-now-label{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
  .mp-now-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;}
  .mp-now-track{font-size:12px;color:rgba(255,255,255,.55);}

  /* 진행바 */
  .mp-prog-wrap{margin-top:16px;}
  .mp-prog-bg{height:4px;background:rgba(255,255,255,.18);border-radius:2px;cursor:pointer;overflow:hidden;}
  .mp-prog-fill{height:100%;background:#e35e3e;border-radius:2px;width:0%;transition:width .4s linear;}
  .mp-prog-time{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:rgba(255,255,255,.4);}

  /* 컨트롤 */
  .mp-controls{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:18px;}
  .mp-ctrl{background:none;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;padding:6px;border-radius:50%;transition:background .12s;}
  .mp-ctrl:hover{background:rgba(255,255,255,.12);}
  .mp-ctrl svg{display:block;}
  .mp-play{width:52px;height:52px;background:#e35e3e;border-radius:50%;}
  .mp-play:hover{background:#c84;}

  /* 트랙 목록 */
  .mp-tracklist-hd{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:8px;}
  .mp-tracklist-hd span{font-size:13px;font-weight:700;color:#1a2e44;}
  .mp-track-cnt{font-size:11px;color:#1a5fa5;background:#e0eaf8;border-radius:20px;padding:2px 9px;}
  .mp-track-list{margin:0 16px 32px;border:1px solid #dde3ef;border-radius:12px;overflow:hidden;background:#fff;}
  .mp-track-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #eef1f7;cursor:pointer;transition:background .1s;}
  .mp-track-item:last-child{border-bottom:none;}
  .mp-track-item:active{background:#f0f4ff;}
  .mp-track-item.playing{background:#eef2fa;}
  .mp-track-no{font-size:12px;color:#aab;width:20px;text-align:center;flex-shrink:0;}
  .mp-track-item.playing .mp-track-no{color:#1a5fa5;}
  .mp-track-name{flex:1;font-size:13px;color:#1a2e44;line-height:1.4;}
  .mp-track-item.playing .mp-track-name{color:#1a5fa5;font-weight:700;}
  .mp-track-dur{font-size:12px;color:#aab;flex-shrink:0;}
</style>
</head>
<body>

<div class="mp-header">
  <button class="mp-back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    돌아가기
  </button>
  <div class="mp-header-title" id="mpHeaderTitle">MP3 바로듣기</div>
</div>

<div class="mp-player-card">
  <div class="mp-now-label">지금 재생 중</div>
  <div class="mp-now-title" id="mpNowTitle">교재를 불러오는 중...</div>
  <div class="mp-now-track" id="mpNowTrack">—</div>
  <div class="mp-prog-wrap">
    <div class="mp-prog-bg" id="mpProgBg">
      <div class="mp-prog-fill" id="mpProgFill"></div>
    </div>
    <div class="mp-prog-time">
      <span id="mpCurTime">0:00</span>
      <span id="mpDurTime">0:00</span>
    </div>
  </div>
  <audio id="mpAudio"></audio>
  <div class="mp-controls">
    <button class="mp-ctrl" onclick="mpPrev()" aria-label="이전 트랙">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="mp-ctrl mp-play" id="mpPlayBtn" onclick="mpTogglePlay()" aria-label="재생/일시정지">
      <svg id="mpPlayIcon" width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="mp-ctrl" onclick="mpNext()" aria-label="다음 트랙">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8z"/><rect x="16" y="6" width="2" height="12" fill="#fff"/></svg>
    </button>
  </div>
</div>

<div class="mp-tracklist-hd">
  <span>트랙 목록</span>
  <span class="mp-track-cnt" id="mpTrackCnt"></span>
</div>
<div class="mp-track-list" id="mpTrackList"></div>

<script src="js/main.js?v=3"></script>
<script>
let mpTracks = [], mpCurIdx = -1;

function fmt(s){ s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function getParam(k){ return new URLSearchParams(location.search).get(k); }

function generateDemoTracks(book){
  const units=['문장의 구조','품사의 이해','시제 기초','시제 심화','동사의 종류','조동사','수동태','부정사','동명사','분사'];
  return Array.from({length:10},(_,i)=>({
    no:i+1,
    title:`Track ${String(i+1).padStart(2,'0')} — Unit ${i+1}. ${units[i]}`,
    file:'',
    duration:120+Math.floor(Math.random()*120)
  }));
}

function renderTracks(){
  document.getElementById('mpTrackList').innerHTML = mpTracks.map((t,i)=>`
    <div class="mp-track-item${i===mpCurIdx?' playing':''}" onclick="mpPlay(${i})">
      <span class="mp-track-no">${i===mpCurIdx?'▶':t.no}</span>
      <span class="mp-track-name">${t.title}</span>
      <span class="mp-track-dur">${fmt(t.duration)}</span>
    </div>`).join('');
}

function mpPlay(idx){
  mpCurIdx = idx;
  const t = mpTracks[idx];
  document.getElementById('mpNowTrack').textContent = t.title;
  document.getElementById('mpProgFill').style.width = '0%';
  document.getElementById('mpCurTime').textContent = '0:00';
  document.getElementById('mpDurTime').textContent = fmt(t.duration);
  renderTracks();
  const audio = document.getElementById('mpAudio');
  if(t.file){
    audio.src = t.file;
    audio.play();
    setPlayIcon(true);
    audio.ontimeupdate = ()=>{
      const pct = audio.duration ? audio.currentTime/audio.duration*100 : 0;
      document.getElementById('mpProgFill').style.width = pct+'%';
      document.getElementById('mpCurTime').textContent = fmt(audio.currentTime);
    };
    audio.onended = ()=>mpNext();
  } else {
    setPlayIcon(false);
  }
}

function setPlayIcon(playing){
  document.getElementById('mpPlayIcon').innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16" fill="#fff"/><rect x="14" y="4" width="4" height="16" fill="#fff"/>'
    : '<path d="M8 5v14l11-7z" fill="#fff"/>';
}

function mpTogglePlay(){
  const a = document.getElementById('mpAudio');
  if(!a.src) return;
  if(a.paused){ a.play(); setPlayIcon(true); } else { a.pause(); setPlayIcon(false); }
}
function mpPrev(){ if(mpCurIdx>0) mpPlay(mpCurIdx-1); }
function mpNext(){ if(mpCurIdx<mpTracks.length-1) mpPlay(mpCurIdx+1); }

// 진행바 클릭
document.getElementById('mpProgBg').addEventListener('click', e=>{
  const a = document.getElementById('mpAudio');
  if(!a.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  a.currentTime = (e.clientX - r.left) / r.width * a.duration;
});

// 초기화
(function(){
  const bookId = getParam('bookId');
  const book = BOOKS.find(b=>b.id==bookId);
  if(!book){ document.getElementById('mpNowTitle').textContent='교재를 찾을 수 없습니다.'; return; }

  document.getElementById('mpHeaderTitle').textContent = book.title;
  document.getElementById('mpNowTitle').textContent = book.title;
  mpTracks = generateDemoTracks(book);
  document.getElementById('mpTrackCnt').textContent = '전체 '+mpTracks.length+'개';
  renderTracks();
  mpPlay(0);
})();
</script>
</body>
</html>
